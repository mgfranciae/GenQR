<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Códigos QR</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #212d3b;
            --accent: #00d4aa;
            --accent-hover: #00f5c4;
            --text-primary: #e8eef4;
            --text-muted: #8899a6;
            --border-color: #2f3f50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* Background con patrón */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 150, 136, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .generator-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(0, 212, 170, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .generator-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(0, 212, 170, 0.1);
        }

        .card-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .card-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.25s ease;
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-control:focus {
            background: var(--bg-secondary);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 212, 170, 0.15);
            color: var(--text-primary);
            outline: none;
        }

        .btn-generate {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            color: var(--bg-primary);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-generate:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 170, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* QR Container */
        .qr-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 200px;
            justify-content: center;
        }

        .qr-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .qr-placeholder svg {
            width: 80px;
            height: 80px;
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .qr-output {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 0.4s ease;
        }

        .qr-output.show {
            display: flex;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-code-wrapper {
            background: #ffffff;
            padding: 1rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode img,
        #qrcode canvas {
            display: block;
        }

        .qr-info {
            margin-top: 1rem;
            text-align: center;
        }

        .qr-text {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            word-break: break-all;
            max-width: 280px;
        }

        .btn-download {
            background: transparent;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 0.625rem 1.25rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-download:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 212, 170, 0.08);
        }

        .btn-download svg {
            width: 18px;
            height: 18px;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .custom-toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-success {
            border-left: 4px solid var(--accent);
        }

        .toast-error {
            border-left: 4px solid #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .generator-card {
                padding: 1.75rem;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .toast-container {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="generator-card">
            <h1 class="card-title text-center">Generador QR</h1>
            <p class="card-subtitle text-center">Ingresa un texto o URL para generar tu código</p>
            
            <form id="qrForm">
                <div class="mb-3">
                    <label for="qrInput" class="form-label">Contenido del código</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="qrInput" 
                        placeholder="https://ejemplo.com o texto..."
                        autocomplete="off"
                        required
                    >
                </div>
                <button type="submit" class="btn-generate" id="btnGenerate">
                    Generar Código QR
                </button>
            </form>

            <div class="qr-container">
                <!-- Placeholder cuando no hay QR -->
                <div class="qr-placeholder" id="qrPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="3" height="3"/>
                        <rect x="18" y="14" width="3" height="3"/>
                        <rect x="14" y="18" width="3" height="3"/>
                        <rect x="18" y="18" width="3" height="3"/>
                    </svg>
                    <p>Tu código QR aparecerá aquí</p>
                </div>

                <!-- Output del QR -->
                <div class="qr-output" id="qrOutput">
                    <div class="qr-code-wrapper">
                        <div id="qrcode"></div>
                    </div>
                    <div class="qr-info">
                        <p class="qr-text" id="qrTextDisplay"></p>
                        <button class="btn-download" id="btnDownload" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Descargar PNG
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- QRCode Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Elementos del DOM
        const form = document.getElementById('qrForm');
        const input = document.getElementById('qrInput');
        const btnGenerate = document.getElementById('btnGenerate');
        const qrPlaceholder = document.getElementById('qrPlaceholder');
        const qrOutput = document.getElementById('qrOutput');
        const qrCodeContainer = document.getElementById('qrcode');
        const qrTextDisplay = document.getElementById('qrTextDisplay');
        const btnDownload = document.getElementById('btnDownload');
        const toastContainer = document.getElementById('toastContainer');

        // Variable para almacenar el canvas del QR
        let currentQRCanvas = null;

        // Función para mostrar toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `custom-toast toast-${type}`;
            
            const icon = type === 'success' 
                ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2">
                     <path d="M20 6L9 17l-5-5"/>
                   </svg>`
                : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2">
                     <circle cx="12" cy="12" r="10"/>
                     <line x1="15" y1="9" x2="9" y2="15"/>
                     <line x1="9" y1="9" x2="15" y2="15"/>
                   </svg>`;
            
            toast.innerHTML = `${icon}<span>${message}</span>`;
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Función para generar QR
        function generateQR(text) {
            // Limpiar contenedor anterior
            qrCodeContainer.innerHTML = '';

            QRCode.toCanvas(text, {
                width: 180,
                margin: 2,
                color: {
                    dark: '#0f1419',
                    light: '#ffffff'
                },
                errorCorrectionLevel: 'H'
            }, function(error, canvas) {
                if (error) {
                    showToast('Error al generar el código QR', 'error');
                    console.error(error);
                    return;
                }

                canvas.style.borderRadius = '8px';
                qrCodeContainer.appendChild(canvas);
                currentQRCanvas = canvas;

                // Mostrar el output
                qrPlaceholder.style.display = 'none';
                qrOutput.classList.add('show');
                qrTextDisplay.textContent = text.length > 50 ? text.substring(0, 50) + '...' : text;

                showToast('Código QR generado correctamente');
            });
        }

        // Función para descargar QR
        function downloadQR() {
            if (!currentQRCanvas) {
                showToast('No hay código QR para descargar', 'error');
                return;
            }

            const link = document.createElement('a');
            link.download = 'codigo-qr.png';
            link.href = currentQRCanvas.toDataURL('image/png');
            link.click();
            
            showToast('Imagen descargada correctamente');
        }

        // Event Listeners
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const text = input.value.trim();
            
            if (!text) {
                showToast('Por favor ingresa un texto o URL', 'error');
                input.focus();
                return;
            }

            btnGenerate.disabled = true;
            btnGenerate.textContent = 'Generando...';

            setTimeout(() => {
                generateQR(text);
                btnGenerate.disabled = false;
                btnGenerate.textContent = 'Generar Código QR';
            }, 300);
        });

        btnDownload.addEventListener('click', downloadQR);

        // Generar QR al presionar Enter
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Focus en el input al cargar
        input.focus();
    </script>
</body>
</html>
